<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skill Diagnostics - Validation Test</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 2rem; background: #f5f7fa; }
        .test-section { background: white; padding: 1.5rem; margin: 1rem 0; border-radius: 8px; border-left: 4px solid #2a5298; }
        .test-pass { border-left-color: #28a745; }
        .test-fail { border-left-color: #dc3545; }
        h1 { color: #1e3c72; }
        h2 { color: #2a5298; margin-top: 2rem; }
        .test-result { padding: 0.5rem; margin: 0.5rem 0; border-radius: 4px; }
        .pass { background: #d4edda; color: #155724; }
        .fail { background: #f8d7da; color: #721c24; }
        .warning { background: #fff3cd; color: #856404; }
        table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
        th, td { padding: 0.75rem; text-align: left; border-bottom: 1px solid #ddd; }
        th { background: #f8f9fa; font-weight: 600; }
        .checkmark { color: #28a745; font-weight: bold; }
        .xmark { color: #dc3545; font-weight: bold; }
    </style>
</head>
<body>
    <h1>🎯 Skill Diagnostics Validation Test</h1>
    <p>Testing all assessment systems, links, and functionality...</p>

    <div id="results"></div>

    <script src="assessments.js"></script>
    <script>
        const results = [];
        const resultsDiv = document.getElementById('results');

        // Test 1: Check if assessmentQuestions is loaded
        function testAssessmentLoading() {
            if (typeof assessmentQuestions !== 'undefined' && assessmentQuestions !== null) {
                results.push({ test: 'Assessment Questions Loaded', status: 'pass', detail: 'assessmentQuestions object found' });
                return true;
            } else {
                results.push({ test: 'Assessment Questions Loaded', status: 'fail', detail: 'assessmentQuestions object not found' });
                return false;
            }
        }

        // Test 2: Check for required test definitions
        function testTestDefinitions() {
            const requiredTests = ['r2r-basics', 'o2c-basics', 'fpa-basics', 'ops-basics', 'q2o-basics', 'om-basics',
                'r2r-mastery', 'o2c-mastery', 'fpa-mastery', 'ops-mastery', 'q2o-mastery', 'om-mastery',
                'r2r-strategy', 'o2c-strategy', 'fpa-strategy', 'ops-strategy', 'q2o-strategy', 'om-strategy'];
            
            const missing = [];
            requiredTests.forEach(test => {
                if (!assessmentQuestions[test]) {
                    missing.push(test);
                }
            });

            if (missing.length === 0) {
                results.push({ test: 'All Test Definitions Present', status: 'pass', detail: `All ${requiredTests.length} tests defined` });
            } else {
                results.push({ test: 'All Test Definitions Present', status: 'fail', detail: `Missing: ${missing.join(', ')}` });
            }
        }

        // Test 3: Validate each test has required properties
        function testTestProperties() {
            const requiredProps = ['name', 'level', 'description', 'questions', 'areas'];
            let issues = [];

            for (let testKey in assessmentQuestions) {
                const test = assessmentQuestions[testKey];
                const missing = requiredProps.filter(prop => !test[prop]);
                if (missing.length > 0) {
                    issues.push(`${testKey}: missing ${missing.join(', ')}`);
                }
            }

            if (issues.length === 0) {
                results.push({ test: 'Test Properties Valid', status: 'pass', detail: `All tests have required properties` });
            } else {
                results.push({ test: 'Test Properties Valid', status: 'fail', detail: issues.slice(0, 3).join('; ') });
            }
        }

        // Test 4: Validate question structure
        function testQuestionStructure() {
            let issues = [];
            let totalQuestions = 0;

            for (let testKey in assessmentQuestions) {
                const test = assessmentQuestions[testKey];
                if (test.questions && Array.isArray(test.questions)) {
                    totalQuestions += test.questions.length;
                    test.questions.forEach((q, idx) => {
                        if (!q.question || !q.options || !Array.isArray(q.options) || !q.explanation) {
                            issues.push(`${testKey} Q${idx}: incomplete`);
                        }
                        if (q.options.length < 2) {
                            issues.push(`${testKey} Q${idx}: less than 2 options`);
                        }
                    });
                }
            }

            if (issues.length === 0) {
                results.push({ test: 'Question Structure Valid', status: 'pass', detail: `${totalQuestions} questions validated` });
            } else {
                results.push({ test: 'Question Structure Valid', status: 'fail', detail: `${issues.length} issues found` });
            }
        }

        // Test 5: Validate each question has at least one correct answer
        function testCorrectAnswers() {
            let issues = [];

            for (let testKey in assessmentQuestions) {
                const test = assessmentQuestions[testKey];
                if (test.questions) {
                    test.questions.forEach((q, idx) => {
                        const correctCount = q.options.filter(o => o.isCorrect).length;
                        if (correctCount === 0) {
                            issues.push(`${testKey} Q${idx}: no correct answer`);
                        }
                    });
                }
            }

            if (issues.length === 0) {
                results.push({ test: 'Correct Answers Present', status: 'pass', detail: 'All questions have correct answers' });
            } else {
                results.push({ test: 'Correct Answers Present', status: 'fail', detail: `${issues.length} questions missing correct answers` });
            }
        }

        // Test 6: Check test type distribution
        function testDistribution() {
            const basics = Object.keys(assessmentQuestions).filter(k => k.includes('basics')).length;
            const mastery = Object.keys(assessmentQuestions).filter(k => k.includes('mastery')).length;
            const strategy = Object.keys(assessmentQuestions).filter(k => k.includes('strategy')).length;

            if (basics === 6 && mastery === 6 && strategy === 6) {
                results.push({ test: 'Test Distribution', status: 'pass', detail: `6 Basics, 6 Mastery, 6 Strategy = 18 total` });
            } else {
                results.push({ test: 'Test Distribution', status: 'fail', detail: `Basics: ${basics}, Mastery: ${mastery}, Strategy: ${strategy}` });
            }
        }

        // Test 7: Validate test areas
        function testAreas() {
            let issues = [];

            for (let testKey in assessmentQuestions) {
                const test = assessmentQuestions[testKey];
                if (!test.areas || !Array.isArray(test.areas) || test.areas.length === 0) {
                    issues.push(`${testKey}: no areas defined`);
                }
            }

            if (issues.length === 0) {
                results.push({ test: 'Test Areas Defined', status: 'pass', detail: 'All tests have skill areas' });
            } else {
                results.push({ test: 'Test Areas Defined', status: 'fail', detail: issues.join('; ') });
            }
        }

        // Test 8: Check for consistency between question areas and test areas
        function testAreaConsistency() {
            let issues = [];

            for (let testKey in assessmentQuestions) {
                const test = assessmentQuestions[testKey];
                if (test.questions && test.areas) {
                    test.questions.forEach(q => {
                        if (!test.areas.includes(q.area)) {
                            issues.push(`${testKey}: question refers to "${q.area}" not in areas list`);
                        }
                    });
                }
            }

            if (issues.length === 0) {
                results.push({ test: 'Area Consistency', status: 'pass', detail: 'All question areas match test areas' });
            } else {
                results.push({ test: 'Area Consistency', status: 'fail', detail: `${issues.length} inconsistencies found` });
            }
        }

        // Run all tests
        function runAllTests() {
            testAssessmentLoading();
            if (typeof assessmentQuestions !== 'undefined') {
                testTestDefinitions();
                testTestProperties();
                testQuestionStructure();
                testCorrectAnswers();
                testDistribution();
                testAreas();
                testAreaConsistency();
            }

            displayResults();
        }

        // Display results
        function displayResults() {
            let html = '<table><tr><th>Test</th><th>Status</th><th>Details</th></tr>';
            let passCount = 0;
            let failCount = 0;

            results.forEach(r => {
                if (r.status === 'pass') {
                    passCount++;
                    html += `<tr><td>${r.test}</td><td><span class="checkmark">✓ PASS</span></td><td>${r.detail}</td></tr>`;
                } else {
                    failCount++;
                    html += `<tr><td>${r.test}</td><td><span class="xmark">✗ FAIL</span></td><td>${r.detail}</td></tr>`;
                }
            });

            html += '</table>';

            const summary = `
                <div class="test-section ${failCount === 0 ? 'test-pass' : 'test-fail'}">
                    <h2>Test Summary</h2>
                    <p><strong>Tests Passed:</strong> ${passCount}/${results.length}</p>
                    ${failCount > 0 ? `<p style="color: #dc3545;"><strong>Tests Failed:</strong> ${failCount}</p>` : '<p style="color: #28a745;"><strong>All Tests Passed! ✓</strong></p>'}
                </div>
            `;

            resultsDiv.innerHTML = summary + html;
        }

        // Run tests when page loads
        window.addEventListener('load', runAllTests);
    </script>
</body>
</html>
